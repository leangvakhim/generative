<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Understanding GANs</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for rendering LaTeX equations -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* Smooth transitions for content */
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <!-- Main Container -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl overflow-hidden flex flex-col border border-slate-100">

        <!-- Header -->
        <div class="bg-white border-b border-slate-100 px-8 py-6 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Generative Adversarial Networks <span
                        class="text-indigo-500">(GANs)</span></h1>
                <p class="text-sm text-slate-500 mt-1">A Step-by-Step Visualization</p>
            </div>
            <!-- Step Indicators -->
            <div class="flex space-x-2" id="step-indicators">
                <!-- Indicators injected by JS -->
            </div>
        </div>

        <!-- Content Area -->
        <div class="p-8 min-h-[400px] flex flex-col" id="content-area">

            <div id="step-content"
                class="fade-enter-active flex-grow flex flex-col items-center justify-center text-center">
                <!-- Visual/SVG Area -->
                <div id="visual-container" class="w-full h-64 flex items-center justify-center mb-12 mt-4">
                    <!-- SVG injected by JS -->
                </div>

                <!-- Text Area -->
                <h2 id="step-title" class="text-2xl font-semibold mb-4 text-slate-800">Title</h2>
                <div id="step-description" class="text-lg text-slate-600 max-w-2xl leading-relaxed">
                    Description goes here.
                </div>

                <!-- Extra Action Container (Used for the Step 5 button) -->
                <div id="extra-action-container" class="mt-6 flex justify-center w-full min-h-[44px]">
                    <!-- Button injected by JS on specific steps -->
                </div>
            </div>

        </div>

        <!-- Footer / Controls -->
        <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 flex justify-between items-center">
            <button id="btn-prev"
                class="px-6 py-2 rounded-lg font-medium text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Previous
            </button>
            <span id="step-counter" class="text-sm font-medium text-slate-400">Step 1 of 6</span>
            <button id="btn-next"
                class="px-6 py-2 rounded-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                Next Step &rarr;
            </button>
        </div>
    </div>

    <script src="../js/gans.js"></script>
</body>

</html>
