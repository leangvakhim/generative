<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latent Space Flaw Visualization</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .map-grid {
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div
        class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row h-auto md:h-[700px] border border-slate-200">

        <!-- Left Panel: Text & Controls (Light Theme) -->
        <div
            class="w-full md:w-1/2 p-8 flex flex-col bg-white text-slate-800 relative z-10 shadow-[4px_0_24px_rgba(0,0,0,0.04)]">

            <div class="flex-1 flex flex-col justify-center">
                <div class="text-xs uppercase tracking-widest text-blue-600 font-bold mb-2">Step <span
                        id="step-counter">1</span> of <span id="total-steps">6</span></div>
                <h1 id="step-title" class="text-3xl font-extrabold mb-6 text-slate-900 min-h-[80px]">The Magical Toy
                    Robot</h1>

                <div id="step-description" class="text-lg text-slate-600 leading-relaxed min-h-[160px] fade-in">
                    <!-- Text will be injected here -->
                </div>

                <!-- Math Formula Container -->
                <div id="math-container" class="mt-6 p-4 bg-slate-50 rounded-xl hidden fade-in border border-slate-200 overflow-x-scroll">
                    <span class="text-sm text-slate-500 mb-2 block">The Math Behind It:</span>
                    <div id="katex-render" class="text-center text-xl text-slate-800"></div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex justify-between mt-8 border-t border-slate-200 pt-6">
                <button id="btn-back"
                    class="px-6 py-3 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    &larr; Back
                </button>
                <button id="btn-next"
                    class="px-6 py-3 rounded-full bg-blue-500 hover:bg-blue-600 text-white font-semibold transition-colors shadow-lg shadow-blue-500/30">
                    Next &rarr;
                </button>
            </div>
        </div>

        <!-- Right Panel: Visualization -->
        <div class="w-full md:w-1/2 p-8 bg-blue-50/50 flex flex-col relative">
            <h2 class="text-center text-slate-500 font-bold tracking-widest uppercase text-sm mb-4">The Latent Space Map
            </h2>

            <!-- Map Area -->
            <div class="flex-1 relative bg-white rounded-2xl border-2 border-dashed border-slate-300 map-grid shadow-inner overflow-hidden"
                id="map-area">

                <!-- Pointer -->
                <div id="pointer"
                    class="absolute w-12 h-12 -ml-6 -mt-6 rounded-full border-4 border-slate-800 opacity-0 transition-all duration-700 ease-in-out z-20 flex items-center justify-center shadow-lg">
                    <div class="w-2 h-2 bg-slate-800 rounded-full"></div>
                </div>

                <!-- Island 1: Blue -->
                <div id="island-blue"
                    class="absolute top-[20%] left-[25%] opacity-0 transition-opacity duration-500 flex flex-col items-center">
                    <div class="w-10 h-10 bg-blue-500 rounded-full border-4 border-white shadow-md"></div>
                    <span class="text-xs font-bold text-slate-600 mt-2 bg-white px-2 py-1 rounded shadow">Island 1
                        (Car)</span>
                </div>

                <!-- Island 2: Purple -->
                <div id="island-purple"
                    class="absolute top-[30%] right-[20%] opacity-0 transition-opacity duration-500 flex flex-col items-center">
                    <div class="w-10 h-10 bg-purple-500 rounded-full border-4 border-white shadow-md"></div>
                    <span class="text-xs font-bold text-slate-600 mt-2 bg-white px-2 py-1 rounded shadow">Island 2
                        (Bear)</span>
                </div>

                <!-- Island 3: Green -->
                <div id="island-green"
                    class="absolute bottom-[20%] left-[50%] -translate-x-1/2 opacity-0 transition-opacity duration-500 flex flex-col items-center">
                    <div class="w-10 h-10 bg-green-500 rounded-full border-4 border-white shadow-md"></div>
                    <span class="text-xs font-bold text-slate-600 mt-2 bg-white px-2 py-1 rounded shadow">Island 3
                        (Lego)</span>
                </div>

                <!-- Empty Space Box -->
                <div id="empty-space-box"
                    class="absolute top-[45%] left-[50%] -translate-x-1/2 -translate-y-1/2 opacity-0 transition-opacity duration-500 z-10 hidden">
                    <div
                        class="w-32 h-32 border-2 border-red-400 bg-red-100/50 rounded-xl flex items-center justify-center">
                        <span class="text-red-600 font-bold text-sm text-center">Empty<br>Ocean</span>
                    </div>
                </div>

            </div>

            <!-- Output Area -->
            <div
                class="mt-6 bg-white p-4 rounded-xl shadow border border-slate-200 h-32 flex items-center justify-center relative overflow-hidden">
                <div class="absolute top-2 left-3 text-xs font-bold text-slate-400 uppercase">Robot Output</div>

                <div id="output-content" class="text-4xl transition-all duration-300 transform scale-0">
                    <!-- Output emoji injected here -->
                </div>

                <div id="garbage-output"
                    class="hidden flex-col items-center justify-center border-4 border-red-500 bg-red-50 text-red-700 w-full h-full rounded-lg absolute top-0 left-0">
                    <span class="font-extrabold tracking-widest uppercase text-xl pulse">Garbage Output Here</span>
                    <span class="text-4xl mt-1">🗑️👾🌪️</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/latent_space.js"></script>
</body>

</html>
