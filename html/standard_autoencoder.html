<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoencoder Concept Visualization</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX for LaTeX formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Google Fonts for a playful yet clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'pulse-slow': 'pulse 3s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .step-container {
            display: none;
        }

        .step-container.active {
            display: flex;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .emoji-shadow {
            filter: drop-shadow(0 10px 8px rgb(0 0 0 / 0.04)) drop-shadow(0 4px 3px rgb(0 0 0 / 0.1));
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-slate-200 py-4 px-6 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                <span class="text-3xl">🧱</span> Autoencoders Explained
            </h1>
            <div class="text-sm font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full" id="step-counter">
                Step 1 of 9
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-4xl mx-auto p-4 sm:p-6 lg:p-8 flex flex-col">

        <!-- Visualization Area (Top half) -->
        <div
            class="bg-white rounded-3xl shadow-lg border border-slate-100 p-8 mb-6 h-64 sm:h-80 flex items-center justify-center relative overflow-hidden bg-gradient-to-b from-blue-50 to-white">
            <div id="visual-container"
                class="w-full h-full flex items-center justify-center transition-all duration-500">
                <!-- Visuals injected here via JS -->
            </div>
        </div>

        <!-- Text & Math Area (Bottom half) -->
        <div class="flex-grow bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8 flex flex-col">
            <div class="flex-grow">
                <h2 id="step-title" class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-4 transition-colors">
                    Title
                </h2>
                <p id="step-desc" class="text-base sm:text-lg text-slate-600 leading-relaxed mb-6">
                    Description
                </p>

                <!-- Formula Box -->
                <div class="w-full flex justify-center">
                    <div id="formula-box"
                        class="bg-slate-50 rounded-xl p-4 border border-slate-200 inline-block text-center">
                        <span
                            class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1 block text-center">The
                            Math Behind It</span>
                        <div id="formula-container" class="text-lg text-blue-800 font-semibold overflow-x-auto">
                            <!-- KaTeX injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Controls -->
    <footer
        class="bg-white border-t border-slate-200 py-4 px-6 sticky bottom-0 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <button id="btn-prev" onclick="changeStep(-1)"
                class="px-6 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </button>

            <!-- Progress Dots -->
            <div class="hidden sm:flex gap-2" id="progress-dots">
                <!-- Dots injected via JS -->
            </div>

            <button id="btn-next" onclick="changeStep(1)"
                class="px-6 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                Next
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </footer>

    <script src="../js/standard_autoencoder.js"></script>
</body>

</html>
