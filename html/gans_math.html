<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAN Math Visualization</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX CSS & JS for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        /* Custom styles for animations and math layout */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .math-block {
            font-size: 1.25rem;
            padding: 1rem;
            background-color: #f8fafc;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            margin: 1rem 0;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .emoji-icon {
            font-size: 2.5rem;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Main Application Container -->
    <div
        class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col min-h-[650px] border border-slate-100">

        <!-- Header -->
        <header class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white text-center shadow-md z-10">
            <h1 class="text-3xl font-bold tracking-tight">Understanding GANs</h1>
            <p class="text-indigo-100 mt-2 text-sm uppercase tracking-wider font-semibold">The Math Behind the Magic</p>
        </header>

        <!-- Dynamic Content Area -->
        <main class="flex-grow p-8 flex flex-col justify-center relative overflow-y-auto" id="main-content">
            <!-- Content will be injected here via JavaScript -->
        </main>

        <!-- Footer / Navigation -->
        <footer class="bg-slate-50 border-t border-slate-200 p-6">

            <!-- Progress Bar -->
            <div class="mb-6 w-full bg-slate-200 rounded-full h-2.5">
                <div id="progress-bar" class="bg-purple-600 h-2.5 rounded-full transition-all duration-500 ease-out"
                    style="width: 0%"></div>
            </div>

            <!-- Controls -->
            <div class="flex justify-between items-center">
                <button id="btn-back"
                    class="px-6 py-2.5 rounded-lg font-semibold text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 hover:text-slate-800 transition-colors focus:ring-4 focus:ring-slate-100 disabled:opacity-50 disabled:cursor-not-allowed">
                    &larr; Back
                </button>

                <span id="step-counter" class="text-sm font-medium text-slate-500">
                    Step 1 of X
                </span>

                <button id="btn-next"
                    class="px-6 py-2.5 rounded-lg font-semibold text-white bg-purple-600 hover:bg-purple-700 shadow-md shadow-purple-200 transition-colors focus:ring-4 focus:ring-purple-200">
                    Next &rarr;
                </button>
            </div>
        </footer>
    </div>

    <script src="../js/gans_math.js"></script>
</body>

</html>
